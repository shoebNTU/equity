name: Daily Run India

on:
  schedule:
    - cron: '0 2 * * *'  # Runs every day at 2 AM UTC

jobs:
  run_scraper:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run scraper
      run: |
        python scraper_india.py

    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        tag: daily-data-india
        name: Daily India Stock Data
        files: latest_india_all.csv
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view daily-data > /dev/null 2>&1; then
            echo "Release exists. Overwriting the asset..."
            gh release upload daily-data latest_nasdaq.csv --clobber
          else
            echo "Release does not exist. Creating it now..."
            gh release create daily-data latest_nasdaq.csv --title "Daily Nasdaq Data" --notes "Automated daily CSV update."
          fi
